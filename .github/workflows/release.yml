name: Release packages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write

concurrency:
  group: monorepo-release-main
  cancel-in-progress: false

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      base: ${{ steps.filter.outputs.base }}
      angular: ${{ steps.filter.outputs.angular }}
      react: ${{ steps.filter.outputs.react }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed package paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            base:
              - 'packages/base/**'
              - '.releaserc.json'
              - 'package.json'
              - 'package-lock.json'
              - '.npmrc'
            angular:
              - 'packages/angular/**'
              - '.releaserc.json'
              - 'package.json'
              - 'package-lock.json'
              - '.npmrc'
            react:
              - 'packages/react/**'
              - '.releaserc.json'
              - 'package.json'
              - 'package-lock.json'
              - '.npmrc'

  release-base:
    needs: changes
    if: needs.changes.outputs.base == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: '@aleks-thunder'
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Release base
        working-directory: packages/base
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node ../../node_modules/semantic-release/bin/semantic-release.js

  release-angular:
    needs: [changes, release-base]
    if: (needs.changes.outputs.angular == 'true' || github.event_name == 'workflow_dispatch') && needs.release-base.result != 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: '@aleks-thunder'
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Release angular
        working-directory: packages/angular
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node ../../node_modules/semantic-release/bin/semantic-release.js

  release-react:
    needs: [changes, release-angular]
    if: (needs.changes.outputs.react == 'true' || github.event_name == 'workflow_dispatch') && needs.release-angular.result != 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: '@aleks-thunder'
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Release react
        working-directory: packages/react
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node ../../node_modules/semantic-release/bin/semantic-release.js
