name: Release packages

on:
  push:
    paths:
      - 'packages/base/**'
      - 'packages/angular/**'
      - 'packages/react/**'
      - 'package.json'
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write

concurrency:
  group: monorepo-release-main
  cancel-in-progress: false

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  release-packages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: '@aleks-thunder'
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Release base
        working-directory: packages/base
        run: npx semantic-release

      - name: Release angular
        working-directory: packages/angular
        run: npx semantic-release

      - name: Release react
        working-directory: packages/react
        run: npx semantic-release
